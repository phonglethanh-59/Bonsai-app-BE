# Cau hinh ket noi MySQL

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/BonsaiShop?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:phong592003}
# Cau hinh JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Chay data.sql khi khoi dong
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Frontend URL (CORS + redirect)
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
